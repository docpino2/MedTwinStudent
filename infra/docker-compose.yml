services:
  db:
    image: pgvector/pgvector:pg16
    container_name: medtwin-student-db
    environment:
      POSTGRES_DB: medtwin
      POSTGRES_USER: medtwin
      POSTGRES_PASSWORD: medtwin
    ports:
      - "5432:5432"
    volumes:
      - medtwin-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medtwin -d medtwin"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  medtwin-db-data:

